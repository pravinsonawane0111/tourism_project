# ══════════════════════════════════════════════════════════════════════════════
# Tourism Wellness Package Prediction — MLOps CI/CD Pipeline
# Triggers automatically on every push to the main branch
# ══════════════════════════════════════════════════════════════════════════════
name: Tourism MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  register-dataset:
    name: "Step 1 — Data Registration"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: pip install huggingface_hub pandas
      - name: Upload raw dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/data_registration.py

  data-preparation:
    name: "Step 2 — Data Preparation"
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: pip install huggingface_hub pandas scikit-learn
      - name: Clean, split and re-upload data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/data_preparation.py

  model-training:
    name: "Step 3 — Model Training & Registration"
    needs: data-preparation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          pip install huggingface_hub scikit-learn xgboost \
                      imbalanced-learn mlflow joblib pandas numpy
      - name: Start MLflow server (background)
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5000 &
          sleep 5
      - name: Train model and upload to HF Model Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/model_training.py

  deploy-to-spaces:
    name: "Step 4 — Deploy Streamlit App to HF Spaces"
    needs: [register-dataset, data-preparation, model-training]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: pip install huggingface_hub
      - name: Push deployment files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<EOF
          import os
          from huggingface_hub import HfApi, login
          login(token=os.environ["HF_TOKEN"])
          api = HfApi()
          SPACE_REPO = "PravinSonawane/tourism-prediction-app"
          try:
              api.repo_info(repo_id=SPACE_REPO, repo_type="space")
          except Exception:
              api.create_repo(repo_id=SPACE_REPO, repo_type="space", space_sdk="streamlit", private=False)
          for remote, local in [("app.py", "tourism_project/deployment/app.py"),
                                 ("requirements.txt", "tourism_project/deployment/requirements.txt"),
                                 ("Dockerfile", "tourism_project/deployment/Dockerfile")]:
              api.upload_file(path_or_fileobj=local, path_in_repo=remote,
                              repo_id=SPACE_REPO, repo_type="space")
              print(f"Uploaded {remote}")
          print("Deployment to HF Spaces complete.")
          EOF

      - name: Auto-commit workflow changes to main
        run: |
          git config --global user.email "pravin@visitwithus.ai"
          git config --global user.name  "Tourism MLOps Bot"
          git add -A
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "ci: auto-update [skip ci]" && git push)
